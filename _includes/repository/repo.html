{% assign repo_url = include.repository | split: '/' %}
{% assign repo_name = repo_url | last %}

<div class="repo p-2">
  <a href="https://github.com/{{ include.repository }}" class="d-flex align-items-center">
    <img
      src="{{ '/assets/img/GitHub-Logo.png' | relative_url }}"
      alt="GitHub logo"
      style="width: 32px; height: 32px; object-fit: contain; margin-right: 10px;"
    >
    <span>{{ repo_name }}</span>
  </a>
</div>
